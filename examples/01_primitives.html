<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>01 — 3D Primitives</title>

  <!-- AR Libraries -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- 8th Wall Engine -->
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData:[{
          "name": "my-poster",
          "type": "PLANAR",
          "imagePath": "../assets/Targets/Da_Vinci_Vitruve_Luc_Viatour.webp",
          "properties": {
            "left": 0, "top": 0,
            "width": 830, "height": 830,
            "originalWidth": 830, "originalHeight": 830,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-assets>
      <a-asset-item id="model-circle" src="../assets/models/circle.glb"></a-asset-item>
      <a-asset-item id="model-square" src="../assets/models/square.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="my-poster">

      <a-plane color="#0d1117" opacity="0.8" rotation="-90 0 0" width="4" height="4" position="0 0.01 0"></a-plane>

      <a-entity position="0 0.05 0" rotation="-90 0 0">

        <a-entity animation="property: rotation; to: 0 0 360; loop: true; dur: 40000; easing: linear">
          
          <a-entity gltf-model="#model-square" animation-mixer="clip: *; loop: repeat" scale="1 1 1"></a-entity>
          <a-entity gltf-model="#model-circle" animation-mixer="clip: *; loop: repeat" scale="1 1 1"></a-entity>

          <a-entity position="0 0 0.2" scale="0.8 0.8 0.8" 
                    animation="property: rotation; to: 0 0 -360; loop: true; dur: 30000; easing: linear">
            
            <a-entity gltf-model="#model-square" animation-mixer="clip: *; loop: repeat"></a-entity>
            <a-entity gltf-model="#model-circle" animation-mixer="clip: *; loop: repeat"></a-entity>

            <a-entity position="0 0 0.2" scale="0.7 0.7 0.7" 
                      animation="property: rotation; to: 0 0 360; loop: true; dur: 20000; easing: linear">
              
              <a-entity gltf-model="#model-square" animation-mixer="clip: *; loop: repeat"></a-entity>
              <a-entity gltf-model="#model-circle" animation-mixer="clip: *; loop: repeat"></a-entity>
              
            </a-entity>
          </a-entity>
        </a-entity>
      </a-entity>
    </xrextras-named-image-target>
  </a-scene>
</body>
</html>
