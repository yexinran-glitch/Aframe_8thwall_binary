<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>01 — 3D Primitives with Static Anchor</title>

  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>

  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData:[{
          "name": "my-poster",
          "type": "PLANAR",
          "imagePath": "../assets/Targets/Da_Vinci_Vitruve_Luc_Viatour.webp",
          "properties": {
            "left": 0, "top": 0,
            "width": 830, "height": 830,
            "originalWidth": 830, "originalHeight": 830,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <script>
    // ==========================================
    // 电影级场记控制器 (Cinematic Scene Director)
    // ==========================================
    AFRAME.registerComponent('scene-director', {
      init: function() {
        const sceneEl = this.el.sceneEl;
        
        sceneEl.addEventListener('xrimagefound', (e) => {
          if (e.detail.name !== 'my-poster') return;

          const f1 = document.querySelector('#f1');
          const f2 = document.querySelector('#f2');
          const f3 = document.querySelector('#f3');
          const f4 = document.querySelector('#f4');
          const tunnel = document.querySelector('#the-tunnel');

          const crossfadeDur = 1500; 
          const holdDur = 1500;      
          const step = crossfadeDur + holdDur; 
          
          let t = 0;

          setTimeout(() => {
            f1.setAttribute('animation__fadein', `property: material.opacity; from: 0; to: 1; dur: ${crossfadeDur}; easing: easeInOutQuad`);
          }, t);

          t += step;

          setTimeout(() => {
            f1.setAttribute('animation__fadeout', `property: material.opacity; from: 1; to: 0; dur: ${crossfadeDur}; easing: easeInOutQuad`);
            f2.setAttribute('animation__fadein', `property: material.opacity; from: 0; to: 1; dur: ${crossfadeDur}; easing: easeInOutQuad`);
          }, t);

          t += step;

          setTimeout(() => {
            f2.setAttribute('animation__fadeout', `property: material.opacity; from: 1; to: 0; dur: ${crossfadeDur}; easing: easeInOutQuad`);
            f3.setAttribute('animation__fadein', `property: material.opacity; from: 0; to: 1; dur: ${crossfadeDur}; easing: easeInOutQuad`);
          }, t);

          t += step;

          setTimeout(() => {
            f3.setAttribute('animation__fadeout', `property: material.opacity; from: 1; to: 0; dur: ${crossfadeDur}; easing: easeInOutQuad`);
            f4.setAttribute('animation__fadein', `property: material.opacity; from: 0; to: 1; dur: ${crossfadeDur}; easing: easeInOutQuad`);
          }, t);

          t += step;

          setTimeout(() => {
            f4.setAttribute('animation__fadeout', `property: material.opacity; from: 1; to: 0; dur: ${crossfadeDur}; easing: easeInOutQuad`);
            tunnel.emit('start-tunnel');
          }, t);
        });
      }
    });

    // ==========================================
    // 达芬奇分形隧道
    // ==========================================
    AFRAME.registerComponent('generative-tunnel', {
      schema: {
        layers: { type: 'int', default: 20 },             
        baseScale: { type: 'number', default: 0.35 },    
        scaleMultiplier: { type: 'number', default: 1.125 }, 
        zStep: { type: 'number', default: 0.05 },         
        staggerDelay: { type: 'number', default: 300 }    
      },

      init: function () {
        const data = this.data;
        const el = this.el;

        const rootAnchor = document.createElement('a-entity');
        rootAnchor.setAttribute('scale', `${data.baseScale} ${data.baseScale} ${data.baseScale}`);
        el.appendChild(rootAnchor);

        const applyOpacityToModel = (e) => {
          const model = e.detail.model;
          const layerIndex = parseInt(e.target.getAttribute('data-index') || 0);
          const targetOpacity = (layerIndex === 0) ? 1.0 : 0.15 + (layerIndex / (data.layers - 1)) * 0.85;

          model.traverse((node) => {
            if (node.isMesh && node.material) {
              node.material.transparent = true;
              node.material.opacity = targetOpacity;
              node.material.needsUpdate = true;
            }
          });
        };
        this.applyOpacityToModel = applyOpacityToModel;

        // ==========================================
        // 【核心分离】：坚固的第一层（Anchor）
        // 在网页加载之初直接“物理浇筑”，没有任何动画和延迟
        // 当海报被识别时，它将立刻出现在海报上作为静止的底座
        // ==========================================
        const layerContainer0 = document.createElement('a-entity');
        const growthNode0 = document.createElement('a-entity');
        
        const square0 = document.createElement('a-entity');
        square0.setAttribute('gltf-model', '#model-square');
        square0.setAttribute('rotation', '-90 0 0');
        square0.setAttribute('data-index', 0); 

        const circle0 = document.createElement('a-entity');
        circle0.setAttribute('gltf-model', '#model-circle');
        circle0.setAttribute('rotation', '-90 0 0');
        circle0.setAttribute('data-index', 0);

        square0.addEventListener('model-loaded', applyOpacityToModel);
        circle0.addEventListener('model-loaded', applyOpacityToModel);

        growthNode0.appendChild(square0);
        growthNode0.appendChild(circle0);
        layerContainer0.appendChild(growthNode0);
        rootAnchor.appendChild(layerContainer0);

        // 将第一层的顶端保存下来，供后续迭代使用
        this.currentParent = growthNode0;

        // 监听场记的哨声，只启动第 2 层及以后的迭代
        this.el.addEventListener('start-tunnel', () => {
          this.buildTunnel();
        });
      },

      buildTunnel: function() {
        const data = this.data;
        const growthDuration = 450; 
        
        // 我们去掉了第一层，所以参与生长的层数是 layers - 1
        const iteratingLayersCount = data.layers - 1; 
        const allLayersGrownTime = ((iteratingLayersCount - 1) * data.staggerDelay) + growthDuration;
        
        let currentParent = this.currentParent;

        // 循环直接从 i = 1 开始（第 2 层）
        for (let i = 1; i < data.layers; i++) {
          const growDelay = (i - 1) * data.staggerDelay; // 让生长时间从 0 开始算起
          const rotationDelay = allLayersGrownTime;

          const layerContainer = document.createElement('a-entity');
          layerContainer.setAttribute('position', '0 0 0');
          layerContainer.setAttribute('scale', '1 1 1');
          layerContainer.setAttribute('rotation', '0 0 0');
          layerContainer.setAttribute('material', `component: material; opacity: 0.88; transparent: true; color: #ffffff`);
          
          const growthNode = document.createElement('a-entity');
          growthNode.setAttribute('position', '0 0 0');
          growthNode.setAttribute('scale', '1 1 1');
          growthNode.setAttribute('rotation', '0 0 0');

          growthNode.setAttribute('animation__pos', `property: position; from: 0 0 0; to: 0 0 ${data.zStep}; dur: ${growthDuration}; delay: ${growDelay}; easing: easeOutQuad`);
          growthNode.setAttribute('animation__scale', `property: scale; from: 1 1 1; to: ${data.scaleMultiplier} ${data.scaleMultiplier} ${data.scaleMultiplier}; dur: ${growthDuration}; delay: ${growDelay}; easing: easeOutQuad`);
          
          layerContainer.setAttribute('animation__rotation', `property: rotation; from: 0 0 0; to: 0 0 10; dur: 2500; delay: ${rotationDelay}; easing: easeOutCubic`);

          const square = document.createElement('a-entity');
          square.setAttribute('gltf-model', '#model-square');
          square.setAttribute('rotation', '-90 0 0');
          square.setAttribute('data-index', i); 

          const circle = document.createElement('a-entity');
          circle.setAttribute('gltf-model', '#model-circle');
          circle.setAttribute('rotation', '-90 0 0');
          circle.setAttribute('data-index', i);

          square.addEventListener('model-loaded', this.applyOpacityToModel);
          circle.addEventListener('model-loaded', this.applyOpacityToModel);

          const particlesWrapper = document.createElement('a-entity');
          particlesWrapper.setAttribute('position', '0 0 0');
          particlesWrapper.setAttribute('scale', '1 1 1');
          particlesWrapper.setAttribute('rotation', '0 0 0');

          const particleDissolveDelay = rotationDelay + 2500 + (i * 100); 
          const driftX = (Math.random() - 0.5) * 0.4; 
          const driftY = (Math.random() - 0.5) * 0.4; 
          const driftZ = Math.random() * 0.3;        
          const rotX = (Math.random() - 0.5) * 20;
          const rotY = (Math.random() - 0.5) * 20;
          const rotZ = (Math.random() - 0.5) * 20;

          setTimeout(() => {
            particlesWrapper.setAttribute('animation__dissolvePos', `property: position; to: ${driftX} ${driftY} ${driftZ}; dur: 2000; easing: easeOutSine`);
            particlesWrapper.setAttribute('animation__dissolveRot', `property: rotation; to: ${rotX} ${rotY} ${rotZ}; dur: 2000; easing: easeOutSine`);
            particlesWrapper.setAttribute('animation__dissolveScale', `property: scale; to: 0 0 0; dur: 2000; easing: easeOutSine`);
          }, particleDissolveDelay); 

          particlesWrapper.appendChild(square);
          particlesWrapper.appendChild(circle);
          growthNode.appendChild(particlesWrapper);
          layerContainer.appendChild(growthNode);

          currentParent.appendChild(layerContainer);
          currentParent = growthNode; 
        }
      }
    });
  </script>
</head>

<body>
  <a-scene
    scene-director
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-assets>
      <a-asset-item id="model-circle" src="../assets/models/circle.glb"></a-asset-item>
      <a-asset-item id="model-square" src="../assets/models/square.glb"></a-asset-item>
      
      <img id="img-frame1" src="../assets/Frame_1.png">
      <img id="img-frame2" src="../assets/Frame_2.png">
      <img id="img-frame3" src="../assets/Frame_3.png">
      <img id="img-frame4" src="../assets/Frame_4.png">
    </a-assets>
    
    <a-camera position="0 4 10"></a-camera>
    
    <xrextras-named-image-target name="my-poster">
      
      <a-plane color="#0d1117" opacity="0.2" width="4" height="4" position="0 0 0.01"></a-plane>
      
      <a-plane id="f1" material="src: #img-frame1; shader: flat; opacity: 0; transparent: true" width="0.74" height="1" position="0 0 0.02"></a-plane>
      <a-plane id="f2" material="src: #img-frame2; shader: flat; opacity: 0; transparent: true" width="0.74" height="1" position="0 0 0.02"></a-plane>
      <a-plane id="f3" material="src: #img-frame3; shader: flat; opacity: 0; transparent: true" width="0.74" height="1" position="0 0 0.02"></a-plane>
      <a-plane id="f4" material="src: #img-frame4; shader: flat; opacity: 0; transparent: true" width="0.74" height="1" position="0 0 0.02"></a-plane>

      <a-entity id="the-tunnel" position="0 0.035 0.05" rotation="0 0 0" generative-tunnel="layers: 20; baseScale: 0.34; scaleMultiplier: 1.125; zStep: 0.03; staggerDelay: 200"></a-entity>

    </xrextras-named-image-target>
  </a-scene>
</body>
</html>
