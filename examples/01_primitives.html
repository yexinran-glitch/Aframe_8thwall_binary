<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>01 — 3D Primitives</title>

  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.1/dist/aframe-extras.min.js"></script>
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>

  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData:[{
          "name": "my-poster",
          "type": "PLANAR",
          "imagePath": "../assets/Targets/Da_Vinci_Vitruve_Luc_Viatour.webp",
          "properties": {
            "left": 0, "top": 0,
            "width": 830, "height": 830,
            "originalWidth": 830, "originalHeight": 830,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <script>
    AFRAME.registerComponent('generative-tunnel', {
      schema: {
        layers: { type: 'int', default: 15 },             // 总层数
        baseScale: { type: 'number', default: 0.35 },    // 第 1 层的基础大小
        scaleMultiplier: { type: 'number', default: 1.125 }, // 逐层放大比例
        zStep: { type: 'number', default: 0.15 },        // 每层向前逼近的距离
        startZ: { type: 'number', default: 0.05 },       // 初始距离
        rotationStep: { type: 'number', default: 4 },     // 每一层的旋转递增角度
        staggerDelay: { type: 'number', default: 400 }    // 每层出场的间隔时间（400ms更丝滑）
      },

      init: function () {
        const data = this.data;
        const el = this.el;

        // 【数学计算】：计算出最后一层模型长出来需要的总时间
        // 比如 15 层，最后一层的延迟是 14 * 400 = 5600ms，加上自身生长 1000ms，总计 6600ms
        const finalLayerGrowTime = ((data.layers - 1) * data.staggerDelay) + 1000;

        for (let i = 0; i < data.layers; i++) {
          const currentScale = data.baseScale * Math.pow(data.scaleMultiplier, i);
          const currentZ = data.startZ + (i * data.zStep);
          const currentRotation = i * data.rotationStep;
          
          // 每一层生长的延迟时间
          const growDelay = i * data.staggerDelay;

          // 【核心改动】：旋转的延迟时间 = 等待全场生长完毕 + 这一层的微调延迟（让旋转也有序接力）
          const rotationDelay = finalLayerGrowTime + (i * 150); 

          // 1. 创建层容器
          const layerEntity = document.createElement('a-entity');
          layerEntity.setAttribute('position', `0 0 ${currentZ}`);
          layerEntity.setAttribute('scale', '0 0 0');
          layerEntity.setAttribute('rotation', '0 0 0');

          // 2. 阶段 1：慢慢有序冒出来
          layerEntity.setAttribute('animation__scale', `
            property: scale;
            from: 0 0 0;
            to: 1 1 1;
            dur: 1000;
            delay: ${growDelay};
            easing: easeOutBack
          `);

          // 3. 阶段 2：全部出现后，再依次优雅旋转
          layerEntity.setAttribute('animation__rotation', `
            property: rotation;
            from: 0 0 0;
            to: 0 0 ${currentRotation};
            dur: 2000;
            delay: ${rotationDelay};
            easing: easeOutCubic
          `);

          // 4. 动态生成你的 Square 和 Circle 模型（保持平躺）
          const square = document.createElement('a-entity');
          square.setAttribute('gltf-model', '#model-square');
          square.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
          square.setAttribute('rotation', '-90 0 0');

          const circle = document.createElement('a-entity');
          circle.setAttribute('gltf-model', '#model-circle');
          circle.setAttribute('scale', `${currentScale} ${currentScale} ${currentScale}`);
          circle.setAttribute('rotation', '-90 0 0');

          layerEntity.appendChild(square);
          layerEntity.appendChild(circle);
          el.appendChild(layerEntity);
        }
      }
    });
  </script>
</head>

<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-assets>
      <a-asset-item id="model-circle" src="../assets/models/circle.glb"></a-asset-item>
      <a-asset-item id="model-square" src="../assets/models/square.glb"></a-asset-item>
    </a-assets>
    
    <a-camera position="0 4 10"></a-camera>
    
    <xrextras-named-image-target name="my-poster">
      
      <a-plane color="#0d1117" opacity="0.7" width="4" height="4" position="0 0 0.01"></a-plane>
      
      <a-entity generative-tunnel="layers: 15; baseScale: 0.35; scaleMultiplier: 1.125; zStep: 0.15; rotationStep: 4; staggerDelay: 350"></a-entity>

    </xrextras-named-image-target>
  </a-scene>
</body>
</html>
